<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Clone</title>
    <link rel="stylesheet" href="catalogo.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Navbar -->
    <header class="navbar" id="navbar">
        <div class="navbar-left">
            <a href="https://www.netflix.com/br/" target="_blank"><img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg"
                alt="Netflix"></a>
            <nav>
                <ul class="nav-links">
                    <li class="active">Início</li>
                    <li>Séries</li>
                    <li>Filmes</li>
                    <li>Bombando</li>
                    <li>Minha lista</li>
                </ul>
            </nav>
        </div>
        <div class="navbar-right">
            <i class="fas fa-search icon"></i>
            <a href="../index.html" class="kids-link">Seu nome</a>
            <div class="nav-notification">
                <i class="fas fa-bell icon"></i>
                <span class="notification-badge">42</span>
            </div>
            <a href="../index.html" class="profile-menu" style="text-decoration: none; color: inherit;">
                <img class="profile-icon" src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png"
                    alt="Profile">
                <i class="fas fa-caret-down icon" style="font-size: 14px; margin-left: 5px;"></i>
            </a>
        </div>
    </header>

    <!-- Sliders Container -->
    <main class="sliders-container" id="main-content">
        <!-- Javascript will inject the rows here -->
    </main>

    <!-- Footer -->
    <footer>
        <div class="footer-content">
            <ul class="footer-links">
                <p>Site criado por <a href="https://www.linkedin.com/in/lauradossi" target="_blank">Laura Dossi</a> na Imersão Alura AI</p>
            </ul>
        </div>
    </footer>

    <script type="module" src="js/main.js"></script>
</body>

</html>
