<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <img class="logo" src="/assets/netflix.webp" alt="Logo da Netflix">
    <main>
        <h1>Quem está assistindo?</h1>
        
        <ul class="profiles-list" aria-label="Lista de perfis">
                <li class="profiles" aria-label="Perfis ordenados">
                    <a href="catalogo/catalogo.html" class="profile" data-name="Wandinha" data-image="assets/perfil1.png">
                        <img src="assets/perfil1.png" alt="Figura feminina, com longos cabelos escuros, óculos de armação preta e grandes olhos expressivos. Ela usa um top preto adornado com delicadas correntes prateadas.">
                        <p>Wandinha</p>
                    </a>
                    <a href="catalogo/catalogo.html" class="profile" data-name="Viking" data-image="assets/perfil2.jpg">
                        <img src="assets/perfil2.jpg" alt="Um homem de cabelos curtos e barba grande, usando um casaco de pele e segurando um machado.">
                        <p>Viking</p>
                    </a>
                    <a href="catalogo/catalogo.html" class="profile" data-name="Atenas" data-image="assets/perfil3.png">
                        <img src="assets/perfil3.png" alt="Uma mulher vestindo um espartilho de couro marrom, óculos de proteção e segurando uma pistola dourada.">
                        <p>Atenas</p>
                    </a>
                    <a href="catalogo/catalogo.html" class="profile" data-name="O maioral" data-image="assets/perfil4.png">
                        <img src="assets/perfil4.png" alt="Um homem de cabelos curtos e barba por fazer, usando uma jaqueta de couro preta e uma camiseta cinza. Ele tem um olhar intenso e confiante através dos óculos.">
                        <p>O maioral</p>
                    </a>
                </li>
        </ul>
        <p class="gerenciar">GERENCIAR PERFIS</p>
    </main>
    <script src="index.js"></script>
</body>
</html>
